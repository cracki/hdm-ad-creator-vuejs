<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#292541" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="/api" />
    <title>HDM Ad Creator</title>
    <script>
      (function(){
        try {
          var m = localStorage.getItem('hdm_theme') || 'auto';
          var d = m === 'dark' || (m === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.add(d ? 'dark' : 'light');
          document.documentElement.style.colorScheme = d ? 'dark' : 'light';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', d ? '#292541' : '#f7f6fa');
        } catch(e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
